<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RicettaManager</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inconsolata:wght@400;500;600&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0F1117; --surface: #181C27; --surface2: #1E2333;
  --border: #2A3045; --border-hi: #3A4560;
  --text: #E8EAF0; --muted: #7A8099; --dim: #4A5270;
  --gold: #E8B84B; --gold-bg: rgba(232,184,75,0.08);
  --red: #E05252; --red-bg: #2A1515;
  --amber: #E8913A; --amber-bg: #2A1E0E;
  --green: #4DB87A; --green-bg: #0E2018;
  --r: 12px;
}
body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }

/* HEADER */
header { background:var(--surface); border-bottom:1px solid var(--border); padding:14px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; gap:12px; }
.logo { font-family:'Playfair Display',serif; font-size:1.4rem; color:var(--gold); white-space:nowrap; }
.logo em { font-style:italic; color:var(--text); }
.hdr-right { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.clock { font-family:'Inconsolata',monospace; font-size:0.72rem; color:var(--muted); text-align:right; line-height:1.7; }

/* ALERT BANNER */
.alert-banner { margin:18px 24px 0; display:none; animation:fadeIn .3s; }
.alert-banner.show { display:block; }
.alert-inner { border-radius:var(--r); padding:13px 17px; }
.alert-inner.urgent { background:var(--red-bg); border:1px solid var(--red); }
.alert-inner.warn   { background:var(--amber-bg); border:1px solid var(--amber); }
.alert-ttl { font-family:'Inconsolata',monospace; font-size:0.68rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; margin-bottom:7px; }
.alert-inner.urgent .alert-ttl { color:var(--red); }
.alert-inner.warn   .alert-ttl { color:var(--amber); }
.alert-chips { display:flex; flex-wrap:wrap; gap:5px; }
.chip { font-size:0.78rem; padding:3px 10px; border-radius:20px; }
.chip.urgent { background:rgba(224,82,82,.15); border:1px solid rgba(224,82,82,.3); color:var(--text); }
.chip.warn   { background:rgba(232,145,58,.15); border:1px solid rgba(232,145,58,.3); color:var(--text); }

/* CONTAINER */
.container { max-width:1120px; margin:0 auto; padding:22px 24px; flex:1; }

/* TOOLBAR */
.toolbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; flex-wrap:wrap; gap:10px; }
.toolbar h2 { font-family:'Playfair Display',serif; font-size:1.15rem; }
.toolbar p  { font-size:0.75rem; color:var(--muted); margin-top:2px; }
.tbar-right { display:flex; gap:8px; }

/* BUTTONS */
.btn { display:inline-flex; align-items:center; gap:5px; padding:8px 15px; border-radius:8px; border:none; cursor:pointer; font-family:'Nunito',sans-serif; font-size:0.83rem; font-weight:700; transition:all .15s; white-space:nowrap; }
.btn-gold    { background:var(--gold); color:#0F1117; }
.btn-gold:hover { filter:brightness(1.1); }
.btn-ghost   { background:var(--surface2); color:var(--text); border:1px solid var(--border-hi); }
.btn-ghost:hover { background:var(--border); }
.btn-red     { background:var(--red-bg); color:var(--red); border:1px solid var(--red); }
.btn-red:hover { background:var(--red); color:#fff; }
.btn-sm { padding:5px 10px; font-size:0.75rem; }

/* GRID */
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:18px; }

/* PATIENT CARD */
.pcard { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; transition:box-shadow .2s, border-color .2s; }
.pcard:hover { border-color:var(--border-hi); box-shadow:0 8px 32px rgba(0,0,0,.4); }
.pcard.s-urgent { border-color:var(--red); }
.pcard.s-warn   { border-color:var(--amber); }

.pcard-head { padding:14px 16px 12px; display:flex; justify-content:space-between; align-items:flex-start; border-bottom:1px solid var(--border); }
.pname { font-family:'Playfair Display',serif; font-size:1.05rem; }
.pmeta { font-family:'Inconsolata',monospace; font-size:0.65rem; color:var(--dim); margin-top:3px; }
.pcard-actions { display:flex; gap:5px; }

/* DRUG LIST */
.drug-list { padding:10px 12px; display:flex; flex-direction:column; gap:8px; }

/* DRUG ROW */
.drow { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:11px 12px; transition:border-color .2s; }
.drow.urgent { border-color:var(--red);   background:var(--red-bg); }
.drow.warn   { border-color:var(--amber); background:var(--amber-bg); }

/* top line */
.drow-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:9px; gap:8px; }
.drow-left { display:flex; align-items:flex-start; gap:8px; flex:1; min-width:0; }
.sdot { width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-top:4px; }
.sdot.ok     { background:var(--green); }
.sdot.warn   { background:var(--amber); }
.sdot.urgent { background:var(--red); animation:pulse 1.2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
.dname { font-size:0.88rem; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ddose { font-family:'Inconsolata',monospace; font-size:0.67rem; color:var(--muted); margin-top:2px; }

.drow-actions { display:flex; gap:3px; flex-shrink:0; }
.bico { background:none; border:none; cursor:pointer; color:var(--dim); font-size:0.82rem; padding:4px 6px; border-radius:6px; transition:all .15s; line-height:1; }
.bico:hover { background:var(--border); color:var(--text); }
.bico.del:hover { background:var(--red-bg); color:var(--red); }
.bico.plus { font-size:0.75rem; }

/* stock display */
.stock-line { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.stock-boxes { display:flex; gap:4px; align-items:center; flex-wrap:wrap; }
.box-icon { font-size:1rem; line-height:1; } /* full box */
.box-partial { position:relative; display:inline-flex; align-items:center; }
/* progress bar */
.pbar-wrap { flex:1; }
.pbar-track { height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
.pbar-fill { height:100%; border-radius:2px; transition:width .4s; }
.pbar-fill.ok     { background:var(--green); }
.pbar-fill.warn   { background:var(--amber); }
.pbar-fill.urgent { background:var(--red); }

/* stock text row */
.stock-text { font-family:'Inconsolata',monospace; font-size:0.7rem; color:var(--muted); display:flex; justify-content:space-between; align-items:center; margin-top:3px; }
.stock-text strong { color:var(--text); }
.badge { font-size:0.63rem; font-weight:700; padding:2px 7px; border-radius:10px; letter-spacing:.04em; text-transform:uppercase; }
.badge.urgent { background:var(--red);   color:#fff; }
.badge.warn   { background:var(--amber); color:#fff; }

/* manual controls */
.drow-controls { display:flex; align-items:center; gap:6px; margin-top:8px; border-top:1px solid var(--border); padding-top:8px; }
.ctrl-btn { background:var(--surface); border:1px solid var(--border-hi); color:var(--text); border-radius:7px; padding:4px 10px; font-size:0.78rem; font-weight:700; cursor:pointer; transition:all .15s; font-family:'Nunito',sans-serif; }
.ctrl-btn:hover { background:var(--border); }
.ctrl-btn.add-box { color:var(--green);  border-color:var(--green); }
.ctrl-btn.add-box:hover { background:var(--green-bg); }
.ctrl-btn.sub-cp  { color:var(--amber); border-color:var(--amber); }
.ctrl-btn.sub-cp:hover { background:var(--amber-bg); }
.ctrl-label { font-family:'Inconsolata',monospace; font-size:0.67rem; color:var(--dim); flex:1; text-align:right; }

/* add drug */
.add-drug-btn { display:flex; align-items:center; gap:6px; margin:0 12px 12px; padding:7px 12px; background:none; border:1px dashed var(--border-hi); border-radius:8px; color:var(--dim); font-family:'Nunito',sans-serif; font-size:0.8rem; font-weight:600; cursor:pointer; transition:all .15s; width:calc(100% - 24px); }
.add-drug-btn:hover { border-color:var(--gold); color:var(--gold); background:var(--gold-bg); }

/* EMPTY */
.empty { text-align:center; padding:80px 20px; color:var(--muted); grid-column:1/-1; }
.empty .ei { font-size:3rem; opacity:.4; margin-bottom:12px; }
.empty h3 { font-family:'Playfair Display',serif; font-size:1.3rem; color:var(--text); margin-bottom:5px; }

/* OVERLAY / MODAL */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,.72); backdrop-filter:blur(6px); z-index:200; display:none; align-items:center; justify-content:center; padding:16px; }
.overlay.open { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border-hi); border-radius:16px; padding:26px; width:100%; max-width:480px; box-shadow:0 24px 64px rgba(0,0,0,.6); animation:mIn .2s ease; }
@keyframes mIn { from{opacity:0;transform:scale(.94) translateY(10px)} to{opacity:1;transform:scale(1) translateY(0)} }
.modal h3 { font-family:'Playfair Display',serif; font-size:1.2rem; color:var(--gold); margin-bottom:20px; }

.fg { margin-bottom:13px; }
.fl { display:block; font-family:'Inconsolata',monospace; font-size:0.68rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin-bottom:5px; }
.fi, .fsel { width:100%; padding:10px 12px; background:var(--surface2); border:1px solid var(--border-hi); border-radius:8px; color:var(--text); font-family:'Nunito',sans-serif; font-size:0.9rem; outline:none; transition:border-color .15s; }
.fi:focus, .fsel:focus { border-color:var(--gold); }
.fsel option { background:var(--surface2); }
.frow { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.fhint { font-size:0.73rem; color:var(--dim); margin-top:4px; }
.fhint strong { color:var(--gold); }

/* stock input group */
.stock-input-group { display:flex; align-items:center; gap:0; }
.stock-input-group .fi { border-radius:8px 0 0 8px; border-right:none; text-align:center; }
.stock-sep { background:var(--border-hi); padding:10px 10px; font-family:'Inconsolata',monospace; font-size:0.8rem; color:var(--muted); border-top:1px solid var(--border-hi); border-bottom:1px solid var(--border-hi); white-space:nowrap; }
.stock-input-group .fi:last-child { border-radius:0 8px 8px 0; border-left:none; border-right:1px solid var(--border-hi); }

.preview-box { background:var(--surface2); border-radius:9px; padding:11px 14px; font-size:0.82rem; color:var(--muted); display:none; margin-top:10px; line-height:1.7; }
.preview-box strong { color:var(--gold); }
.preview-box .pv-boxes { display:flex; gap:3px; margin-top:6px; align-items:center; flex-wrap:wrap; }

.mfooter { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; }

/* search */
.sri { padding:10px 12px; border-radius:8px; cursor:pointer; border-bottom:1px solid var(--border); transition:background .15s; }
.sri:hover { background:var(--surface2); }

@keyframes fadeIn { from{opacity:0} to{opacity:1} }
::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-track { background:var(--bg); } ::-webkit-scrollbar-thumb { background:var(--border-hi); border-radius:3px; }
</style>
</head>
<body>

<header>
  <div class="logo">Ricetta<em>Manager</em></div>
  <div class="hdr-right">
    <div class="clock"><div id="hDate"></div><div id="hAlert" style="color:var(--gold);font-weight:700"></div></div>
    <button class="btn btn-ghost btn-sm" onclick="openSearch()">🔍 Cerca</button>
    <button class="btn btn-gold" onclick="openAddPatient()">＋ Paziente</button>
  </div>
</header>

<div class="alert-banner" id="alertBanner">
  <div class="alert-inner" id="alertInner">
    <div class="alert-ttl" id="alertTtl"></div>
    <div class="alert-chips" id="alertChips"></div>
  </div>
</div>

<div class="container">
  <div class="toolbar">
    <div>
      <h2>Terapie attive</h2>
      <p>Scorte scalate automaticamente · aggiornamento in tempo reale</p>
    </div>
    <div class="tbar-right">
      <button class="btn btn-ghost btn-sm" onclick="render()">⟳ Aggiorna</button>
      <button class="btn btn-ghost btn-sm" onclick="exportData()" title="Esporta backup dati">💾 Esporta</button>
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('importFile').click()" title="Importa backup dati">📂 Importa</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>
  <div class="grid" id="grid"></div>
</div>

<!-- MODAL: Paziente -->
<div class="overlay" id="ovPatient">
  <div class="modal">
    <h3 id="ptTitle">Nuovo paziente</h3>
    <div class="fg"><label class="fl">Nome e cognome</label><input class="fi" id="ptName" placeholder="es. Mario Rossi"></div>
    <div class="frow">
      <div class="fg"><label class="fl">Codice / ID</label><input class="fi" id="ptCode" placeholder="es. P001"></div>
      <div class="fg"><label class="fl">Data di nascita</label><input class="fi" type="date" id="ptDob"></div>
    </div>
    <div class="mfooter">
      <button class="btn btn-ghost" onclick="closeOv('ovPatient')">Annulla</button>
      <button class="btn btn-gold" onclick="savePatient()">Salva</button>
    </div>
  </div>
</div>

<!-- MODAL: Farmaco -->
<div class="overlay" id="ovDrug">
  <div class="modal">
    <h3 id="drgTitle">Aggiungi farmaco</h3>
    <div class="fg"><label class="fl">Nome farmaco</label><input class="fi" id="dName" placeholder="es. Ramipril 5mg"></div>
    <div class="frow">
      <div class="fg">
        <label class="fl">Compresse / die</label>
        <input class="fi" type="number" id="dCpDie" min="0.25" step="0.25" placeholder="es. 1">
        <div class="fhint">Frazioni: <strong>0.5</strong> = ½ cp</div>
      </div>
      <div class="fg">
        <label class="fl">Cp per confezione</label>
        <input class="fi" type="number" id="dCpBox" min="1" step="1" placeholder="es. 30">
      </div>
    </div>

    <!-- SCORTA REALE -->
    <div class="fg">
      <label class="fl">Scorta attuale — compresse totali</label>
      <input class="fi" type="number" id="dCpTot" min="0" step="1" placeholder="es. 64  (= 2 conf. da 30 + 4 cp aperte)">
      <div class="fhint">Conta tutte le compresse: quelle nelle confezioni chiuse <strong>+</strong> quelle nella confezione aperta.</div>
    </div>

    <div class="preview-box" id="dPreview"></div>

    <div class="mfooter">
      <button class="btn btn-ghost" onclick="closeOv('ovDrug')">Annulla</button>
      <button class="btn btn-gold" onclick="saveDrug()">Salva farmaco</button>
    </div>
  </div>
</div>

<!-- MODAL: Cerca -->
<div class="overlay" id="ovSearch">
  <div class="modal">
    <h3>Cerca paziente</h3>
    <input class="fi" id="sQ" placeholder="Nome o codice..." oninput="doSearch()">
    <div id="sRes" style="margin-top:12px;max-height:260px;overflow-y:auto;"></div>
    <div class="mfooter"><button class="btn btn-ghost" onclick="closeOv('ovSearch')">Chiudi</button></div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
// Drug model:
//   name, cpDie, cpBox, cpRemaining (source of truth, float),
//   lastSync (ISO date string — date when cpRemaining was last set/saved)
// On render: cpNow = cpRemaining - daysSinceLastSync * cpDie  (floored to 0)

let patients = JSON.parse(localStorage.getItem('rm3_pts') || '[]');
let editPid = null, editDid = null, curPid = null;

function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function save() { localStorage.setItem('rm3_pts', JSON.stringify(patients)); }
function getP(id) { return patients.find(p=>p.id===id); }
function today() { return new Date().toISOString().split('T')[0]; }

// ── CONSUMPTION ENGINE ────────────────────────────────────────────────────
function daysBetween(isoA, isoB) {
  return Math.floor((new Date(isoB) - new Date(isoA)) / 86400000);
}

// Returns current real pill count (float, ≥ 0)
function currentCp(drug) {
  const elapsed = daysBetween(drug.lastSync, today());
  return Math.max(0, drug.cpRemaining - elapsed * drug.cpDie);
}

// Derived display values
function computeDrug(drug) {
  const cp      = currentCp(drug);
  const boxes   = Math.floor(cp / drug.cpBox);          // confezioni intere chiuse
  const partial = cp % drug.cpBox;                       // cp nella conf. aperta (o 0)
  const hasOpen = partial > 0;                           // c'è una confezione aperta
  const totalConf = boxes + (hasOpen ? 1 : 0);          // confezioni totali (incl. aperta)
  const daysLeft  = drug.cpDie > 0 ? Math.floor(cp / drug.cpDie) : Infinity;
  const maxCp     = drug.cpBox * Math.ceil(drug.cpRemaining / drug.cpBox || 1);
  const pct       = drug.cpRemaining > 0 ? Math.min(100, (cp / drug.cpRemaining) * 100) : 0;

  // Status: warn = ultima confezione (totalConf === 1), urgent = esaurito
  const status = cp === 0 ? 'urgent' : totalConf <= 1 ? 'warn' : 'ok';

  return { cp, boxes, partial: Math.round(partial), hasOpen, totalConf, daysLeft, pct, status };
}

// ── HEADER ────────────────────────────────────────────────────────────────
function updateHeader() {
  document.getElementById('hDate').textContent =
    new Date().toLocaleDateString('it-IT',{weekday:'short',day:'2-digit',month:'long',year:'numeric'});
}

// ── ALERTS ────────────────────────────────────────────────────────────────
function refreshAlerts() {
  const urgent=[], warn=[];
  patients.forEach(p => p.drugs.forEach(d => {
    const s = computeDrug(d).status;
    const lbl = `${p.name} · ${d.name}`;
    if (s==='urgent') urgent.push(lbl);
    else if (s==='warn') warn.push(lbl);
  }));
  const banner = document.getElementById('alertBanner');
  const inner  = document.getElementById('alertInner');
  const total  = urgent.length + warn.length;
  if (!total) {
    banner.classList.remove('show');
    document.getElementById('hAlert').textContent = '✓ Tutto OK';
    return;
  }
  banner.classList.add('show');
  const isUrgent = urgent.length > 0;
  inner.className = 'alert-inner ' + (isUrgent ? 'urgent' : 'warn');
  document.getElementById('alertTtl').textContent = isUrgent
    ? `⚠ ${urgent.length} farmac${urgent.length>1?'i':'o'} esaurit${urgent.length>1?'i':'o'} — ricetta urgente`
    : `📦 ${warn.length} farmac${warn.length>1?'i':'o'} all'ultima confezione`;
  document.getElementById('alertChips').innerHTML =
    [...urgent.map(l=>`<span class="chip urgent">${l}</span>`),
     ...warn.map(l=>`<span class="chip warn">${l}</span>`)].join('');
  document.getElementById('hAlert').textContent = `${total} alert attiv${total>1?'i':'o'}`;
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render(filterIds) {
  const grid = document.getElementById('grid');
  let list = filterIds ? patients.filter(p=>filterIds.includes(p.id)) : [...patients];

  // sort: urgent→warn→ok
  const score = p => { const ss = p.drugs.map(d=>computeDrug(d).status); return ss.includes('urgent')?0:ss.includes('warn')?1:2; };
  list.sort((a,b)=>score(a)-score(b));

  grid.innerHTML = '';
  if (!list.length) {
    grid.innerHTML = `<div class="empty"><div class="ei">💊</div><h3>Nessun paziente</h3><p>Premi "+ Paziente" per iniziare.</p></div>`;
    refreshAlerts(); return;
  }

  list.forEach(patient => {
    const ws = score(patient)===0?'urgent':score(patient)===1?'warn':'ok';

    const rows = patient.drugs.map(drug => {
      const c = computeDrug(drug);
      const s = c.status;
      const pct = c.pct.toFixed(1);

      // Box icons: full boxes + partial indicator
      let boxIcons = '';
      for (let i=0;i<Math.min(c.boxes,8);i++) boxIcons += `<span class="box-icon" title="Confezione intera">📦</span>`;
      if (c.boxes>8) boxIcons += `<span style="font-family:Inconsolata,monospace;font-size:0.7rem;color:var(--muted)"> +${c.boxes-8}</span>`;
      if (c.hasOpen) boxIcons += `<span title="${c.partial} cp rimaste nella conf. aperta" style="font-family:Inconsolata,monospace;font-size:0.72rem;color:var(--amber);margin-left:2px">[${c.partial}cp]</span>`;
      if (!boxIcons) boxIcons = `<span style="font-family:Inconsolata,monospace;font-size:0.72rem;color:var(--red)">Nessuna scorta</span>`;

      const badge = s==='urgent' ? `<span class="badge urgent">ESAURITO</span>`
                  : s==='warn'   ? `<span class="badge warn">ULTIMA CONF.</span>` : '';

      const daysStr = s==='urgent'?'0 giorni':isFinite(c.daysLeft)?`${c.daysLeft} gg`:'—';

      return `
        <div class="drow ${s}" id="dr-${drug.id}">
          <div class="drow-top">
            <div class="drow-left">
              <div class="sdot ${s}"></div>
              <div style="min-width:0">
                <div class="dname">${drug.name}</div>
                <div class="ddose">${drug.cpDie} cp/die · ${drug.cpBox} cp/conf.</div>
              </div>
            </div>
            <div class="drow-actions">
              <button class="bico" title="Modifica" onclick="openEditDrug('${patient.id}','${drug.id}')">✎</button>
              <button class="bico del" title="Elimina" onclick="deleteDrug('${patient.id}','${drug.id}')">✕</button>
            </div>
          </div>

          <!-- Box icons -->
          <div class="stock-line">
            <div class="stock-boxes">${boxIcons}</div>
          </div>

          <!-- Progress bar -->
          <div class="pbar-wrap">
            <div class="pbar-track"><div class="pbar-fill ${s}" style="width:${pct}%"></div></div>
          </div>

          <!-- Stock text -->
          <div class="stock-text">
            <span><strong>${Math.round(c.cp)} cp</strong> rimaste · ${daysStr} di terapia</span>
            ${badge}
          </div>

          <!-- Manual controls -->
          <div class="drow-controls">
            <button class="ctrl-btn add-box" onclick="addBox('${patient.id}','${drug.id}')" title="Aggiungi una confezione">＋ 1 conf.</button>
            <button class="ctrl-btn sub-cp"  onclick="subCp('${patient.id}','${drug.id}')"  title="Scala 1 compressa manualmente">－ 1 cp</button>
            <span class="ctrl-label">Ultimo sync: ${drug.lastSync}</span>
          </div>
        </div>`;
    }).join('') || '<p style="color:var(--dim);font-size:0.8rem;padding:4px 2px">Nessun farmaco</p>';

    const code = patient.code ? `<div class="pmeta">${patient.code}${patient.dob?' · '+new Date(patient.dob+'T12:00').toLocaleDateString('it-IT'):''}</div>` : '';

    grid.innerHTML += `
      <div class="pcard s-${ws}" id="card-${patient.id}">
        <div class="pcard-head">
          <div><div class="pname">${patient.name}</div>${code}</div>
          <div class="pcard-actions">
            <button class="btn btn-ghost btn-sm" onclick="openEditPatient('${patient.id}')">✎</button>
            <button class="btn btn-red btn-sm" onclick="delPatient('${patient.id}')">✕</button>
          </div>
        </div>
        <div class="drug-list">${rows}</div>
        <button class="add-drug-btn" onclick="openAddDrug('${patient.id}')">＋ Aggiungi farmaco</button>
      </div>`;
  });

  refreshAlerts();
}

// ── MANUAL CONTROLS ───────────────────────────────────────────────────────
// Sync cpRemaining to current real value, then apply delta, reset lastSync=today
function syncAndAdjust(pid, did, deltaCp) {
  const d = getP(pid).drugs.find(x=>x.id===did);
  const now = currentCp(d);
  d.cpRemaining = Math.max(0, now + deltaCp);
  d.lastSync = today();
  save(); render();
}

function addBox(pid, did) {
  const d = getP(pid).drugs.find(x=>x.id===did);
  syncAndAdjust(pid, did, d.cpBox);
}
function subCp(pid, did) {
  syncAndAdjust(pid, did, -1);
}

// ── PATIENT CRUD ──────────────────────────────────────────────────────────
function openAddPatient() {
  editPid=null;
  document.getElementById('ptTitle').textContent='Nuovo paziente';
  ['ptName','ptCode','ptDob'].forEach(i=>document.getElementById(i).value='');
  openOv('ovPatient');
}
function openEditPatient(id) {
  editPid=id; const p=getP(id);
  document.getElementById('ptTitle').textContent='Modifica paziente';
  document.getElementById('ptName').value=p.name;
  document.getElementById('ptCode').value=p.code||'';
  document.getElementById('ptDob').value=p.dob||'';
  openOv('ovPatient');
}
function savePatient() {
  const name=document.getElementById('ptName').value.trim();
  if(!name){alert('Inserisci il nome.');return;}
  if(editPid){
    const p=getP(editPid); p.name=name; p.code=document.getElementById('ptCode').value.trim(); p.dob=document.getElementById('ptDob').value;
  } else {
    patients.push({id:uid(),name,code:document.getElementById('ptCode').value.trim(),dob:document.getElementById('ptDob').value,drugs:[]});
  }
  save(); closeOv('ovPatient'); render();
}
function delPatient(id) {
  if(!confirm(`Rimuovere ${getP(id).name}?`))return;
  patients=patients.filter(p=>p.id!==id); save(); render();
}

// ── DRUG CRUD ─────────────────────────────────────────────────────────────
function openAddDrug(pid) {
  curPid=pid; editDid=null;
  document.getElementById('drgTitle').textContent='Aggiungi farmaco';
  ['dName','dCpDie','dCpBox','dCpTot'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('dPreview').style.display='none';
  openOv('ovDrug');
}
function openEditDrug(pid, did) {
  curPid=pid; editDid=did;
  const d=getP(pid).drugs.find(x=>x.id===did);
  document.getElementById('drgTitle').textContent='Modifica farmaco';
  document.getElementById('dName').value=d.name;
  document.getElementById('dCpDie').value=d.cpDie;
  document.getElementById('dCpBox').value=d.cpBox;
  // Show current real pill count
  document.getElementById('dCpTot').value=Math.round(currentCp(d));
  updatePreview();
  openOv('ovDrug');
}

function updatePreview() {
  const cpDie = parseFloat(document.getElementById('dCpDie').value);
  const cpBox  = parseInt(document.getElementById('dCpBox').value);
  const cpTot  = parseInt(document.getElementById('dCpTot').value);
  const prev   = document.getElementById('dPreview');
  if (!cpDie||!cpBox||isNaN(cpTot)) { prev.style.display='none'; return; }
  const boxes   = Math.floor(cpTot/cpBox);
  const partial = cpTot%cpBox;
  const days    = cpDie>0?Math.floor(cpTot/cpDie):Infinity;
  let boxHtml='';
  for(let i=0;i<Math.min(boxes,8);i++) boxHtml+=`<span>📦</span>`;
  if(boxes>8) boxHtml+=`<span style="font-size:0.7rem;color:var(--muted)">+${boxes-8}</span>`;
  if(partial>0) boxHtml+=`<span style="font-size:0.72rem;color:var(--amber)">[${partial}cp aperta]</span>`;
  prev.style.display='block';
  prev.innerHTML = `
    <strong>${cpTot} compresse totali</strong><br>
    ${boxes} conf. intere${partial>0?` + ${partial} cp nella conf. aperta`:''} · scorte per <strong>${isFinite(days)?days+'gg':'—'}</strong>
    <div class="pv-boxes">${boxHtml||'<span style="color:var(--red);font-size:0.75rem">Nessuna scorta</span>'}</div>`;
}
['dCpDie','dCpBox','dCpTot'].forEach(id=>document.getElementById(id).addEventListener('input',updatePreview));

function saveDrug() {
  const name  = document.getElementById('dName').value.trim();
  const cpDie = parseFloat(document.getElementById('dCpDie').value);
  const cpBox = parseInt(document.getElementById('dCpBox').value);
  const cpTot = parseInt(document.getElementById('dCpTot').value);
  if(!name||!cpDie||!cpBox||isNaN(cpTot)){alert('Compila tutti i campi.');return;}
  const p=getP(curPid);
  if(editDid){
    const d=p.drugs.find(x=>x.id===editDid);
    Object.assign(d,{name,cpDie,cpBox,cpRemaining:cpTot,lastSync:today()});
  } else {
    p.drugs.push({id:uid(),name,cpDie,cpBox,cpRemaining:cpTot,lastSync:today()});
  }
  save(); closeOv('ovDrug'); render();
}
function deleteDrug(pid,did){
  const d=getP(pid).drugs.find(x=>x.id===did);
  if(!confirm(`Rimuovere "${d.name}"?`))return;
  getP(pid).drugs=getP(pid).drugs.filter(x=>x.id!==did);
  save(); render();
}

// ── SEARCH ────────────────────────────────────────────────────────────────
function openSearch(){document.getElementById('sQ').value='';document.getElementById('sRes').innerHTML='';openOv('ovSearch');}
function doSearch(){
  const q=document.getElementById('sQ').value.toLowerCase();
  const r=document.getElementById('sRes');
  if(!q){r.innerHTML='';return;}
  const f=patients.filter(p=>p.name.toLowerCase().includes(q)||(p.code||'').toLowerCase().includes(q));
  if(!f.length){r.innerHTML='<p style="color:var(--muted);font-size:0.83rem;padding:8px">Nessun risultato.</p>';return;}
  r.innerHTML=f.map(p=>`<div class="sri" onclick="scrollCard('${p.id}')"><strong>${p.name}</strong>${p.code?` <span style="font-family:Inconsolata,monospace;font-size:0.68rem;color:var(--muted)">${p.code}</span>`:''}<div style="font-size:0.74rem;color:var(--muted);margin-top:2px">${p.drugs.length} farmaci</div></div>`).join('');
}
function scrollCard(id){
  closeOv('ovSearch');
  setTimeout(()=>{
    const el=document.getElementById('card-'+id);
    if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.outline='2px solid var(--gold)';setTimeout(()=>el.style.outline='',1600);}
  },180);
}

// ── OVERLAY ───────────────────────────────────────────────────────────────
function openOv(id) {document.getElementById(id).classList.add('open');}
function closeOv(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.overlay.open').forEach(o=>o.classList.remove('open'));});

// ── BACKUP / RIPRISTINO ───────────────────────────────────────────────────
function exportData() {
  if (!patients.length) { alert('Nessun dato da esportare.'); return; }
  const payload = {
    version: 3,
    exportedAt: new Date().toISOString(),
    patients
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const dateStr = new Date().toISOString().split('T')[0];
  a.href     = url;
  a.download = `ricettamanager-backup-${dateStr}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const payload = JSON.parse(e.target.result);
      if (!payload.patients || !Array.isArray(payload.patients)) throw new Error('Formato non valido');
      const n = payload.patients.length;
      if (!confirm(`Trovati ${n} pazient${n===1?'e':'i'} nel backup.\n\nATTENZIONE: i dati attuali verranno sostituiti.\nContinuare?`)) return;
      patients = payload.patients;
      save();
      render();
      alert(`✓ Importazione completata: ${n} pazient${n===1?'e':'i'} caricati.`);
    } catch(err) {
      alert('Errore: file non valido o danneggiato.\n' + err.message);
    }
    // reset input so same file can be imported again if needed
    event.target.value = '';
  };
  reader.readAsText(file);
}

// ── AUTO REFRESH ogni ora ─────────────────────────────────────────────────
setInterval(()=>{render();updateHeader();},3600000);

// ── INIT ──────────────────────────────────────────────────────────────────
updateHeader(); render();
</script>
